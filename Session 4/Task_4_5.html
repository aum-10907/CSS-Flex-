<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .grow{
            display: flex;
            width: 100%;
            height: 300px;
            background-color: black;
        }
        div{
            display: flex;
            height: 80px;
            width: 80px;
            align-items: center;
            color: rgb(10, 11, 96);
            background-color: bisque;
            justify-content: space-evenly;
            border: 2px solid red;
        }
        #grow{
            flex-grow: 2;
        }
        
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="grow">
        <div>Basic</div>
        <div id="grow">Pro</div>
        <div>Premium</div>
    </div>
</body>
</html>
