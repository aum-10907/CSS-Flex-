<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        *{
            background-color: aqua;
        }
        div{
            display: flex;
            width: 100px;
            height: 50px;
            background-color:white  ;
            justify-content: space-around;
            align-items: center;
            border: 2px solid;
            color: black;
            font-size: x-large;
        }
        .diff{
            justify-content: space-around;
            width: 100%;
            height: 100px;
            background-color: black;
        }
        #middle{
            align-self: flex-end;
        }
        #last, #first{
            align-self: flex-start;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
</head>
<body>
    <div class="diff">
        <div id="first">1</div>
        <div id="middle">2</div>
        <div id="last">3</div>
    </div>
</body>
</html>
