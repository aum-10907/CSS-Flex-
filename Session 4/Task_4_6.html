<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        div{
            display: flex;
            background-color: black;
            color: aliceblue;
            height: 100px;
            width: 100%;
            border: 2px solid white;
            align-items: center;
            justify-content: center;
        }
        #grow{
            flex-shrink: 1;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Layout</title>
</head>
<body>
    <div>
        <div>1</div>
        <div>2</div>
        <div id="grow">3</div>
        <div>4</div>
    </div>
</body>
</html>
