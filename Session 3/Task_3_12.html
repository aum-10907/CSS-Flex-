<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .red{
            border: 2px solid red;
            position: relative;
            width: 100px;
            height: 100px;
            background-color: red;
            z-index: 1;
            margin: 30px;
        }
        .green{
            border: 2px solid green;
            position:absolute;
            width: 80px;
            height: 80px;
            background-color: green;
            margin: 50px;
            top: 30px

        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-index</title>
</head>
<body>
    <p class="red">Red Box</p>
    <P class="green">Green Box</P>
    <b>This is a normal text</b>
</body>
</html>
